<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f7a4d" />
  <title>피클볼 회원관리</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <radialGradient id="pbhi" cx="36%" cy="30%" r="70%"><stop offset="0" stop-color="#f4ffcf"/><stop offset="55%" stop-color="#bff03a" stop-opacity="0"/></radialGradient></defs>
  <symbol id="pbball" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="47" fill="#a9e02f"/><circle cx="50" cy="50" r="47" fill="url(#pbhi)"/>
  <g fill="#3c6612"><circle cx="50" cy="50" r="5.2"/><circle cx="70" cy="50" r="5.2"/><circle cx="60" cy="67.3" r="5.2"/><circle cx="40" cy="67.3" r="5.2"/><circle cx="30" cy="50" r="5.2"/><circle cx="40" cy="32.7" r="5.2"/><circle cx="60" cy="32.7" r="5.2"/><circle cx="81" cy="68" r="4.6"/><circle cx="50" cy="86" r="4.6"/><circle cx="19" cy="68" r="4.6"/><circle cx="19" cy="32" r="4.6"/><circle cx="50" cy="14" r="4.6"/><circle cx="81" cy="32" r="4.6"/></g></symbol></svg>
  <header class="topbar" id="topbar" style="display:none">
    <div class="brand">🏓 <span id="clubName">피클볼 클럽</span></div>
    <div class="top-right">
      <span id="whoami" class="whoami"></span>
      <button id="bell" class="bell hidden" onclick="UI.bellClick()" title="알림">🔔<span id="bellCount" class="bell-count hidden">0</span></button>
      <button id="logoutBtn" class="btn ghost sm" onclick="UI.logout()">로그아웃</button>
    </div>
  </header>

  <nav class="tabs" id="tabs" style="display:none"></nav>

  <main id="app">
    <section id="view-login" class="view active"></section>
    <section id="view-dashboard" class="view"></section>
    <section id="view-members" class="view"></section>
    <section id="view-schedules" class="view"></section>
    <section id="view-payments" class="view"></section>
    <section id="view-coaches" class="view"></section>
    <section id="view-myinfo" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">제목</h3>
        <button class="icon-btn" onclick="UI.closeModal()">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }
  </script>
</body>
</html>
